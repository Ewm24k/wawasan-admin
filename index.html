<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Log Masuk Admin — Wawasan Sabak AJK Admin Dashboard</title>
<link rel="icon" type="image/jpeg" href="assets/images/logo.jpg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@700;800&family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/admin.css">
</head>
<body>

<div class="login-wrap">
  <div class="login-card">
    <div class="login-card__logo">
      <img src="assets/images/logo.jpg" alt="Logo">
      <span class="login-card__logo-text"><strong>WAWASAN SABAK</strong>AJK ADMIN DASHBOARD</span>
    </div>
    <h1>Log Masuk Admin</h1>
    <p class="sub">Akses terhad — untuk AJK yang diberi kebenaran sahaja.</p>

    <form id="loginForm">
      <div class="login-field">
        <label for="loginEmail">E-mel</label>
        <input type="email" id="loginEmail" autocomplete="username" required>
      </div>
      <div class="login-field">
        <label for="loginPassword">Kata Laluan</label>
        <input type="password" id="loginPassword" autocomplete="current-password" required>
      </div>
      <button class="login-btn" type="submit" id="loginBtn">Log Masuk</button>
      <p class="login-error" id="loginError"></p>
    </form>
  </div>
</div>

<script type="module" src="assets/js/firebase-config.js"></script>
<script type="module" src="assets/js/admin-login.js"></script>
</body>
</html>
